<div class="page-container">
   <div class="auth-card change-pwd-card">
      <div class="auth-header">
         <div class="step-icon">
            <ng-icon name="lucideLock"></ng-icon>
         </div>
         <h2>Đổi mật khẩu</h2>
         <p>Vui lòng nhập mật khẩu hiện tại và mật khẩu mới</p>
      </div>

      <form [formGroup]="changeForm" (ngSubmit)="onSubmit()" class="auth-form">
         <div class="form-group">
            <label>Mật khẩu hiện tại</label>
            <div class="input-eye">
               <input
                  [type]="showCurrent ? 'text' : 'password'"
                  formControlName="currentPassword"
                  placeholder="Nhập mật khẩu hiện tại..."
               />
               <button type="button" class="eye-btn" (click)="showCurrent = !showCurrent">
                  <div *ngIf="!showCurrent">
                     <ng-icon name="lucideEye"></ng-icon>
                  </div>
                  <div *ngIf="showCurrent">
                     <ng-icon name="lucideEyeOff"></ng-icon>
                  </div>
               </button>
            </div>
            <span
               class="error-text"
               *ngIf="
                  changeForm.get('currentPassword')?.touched &&
                  changeForm.get('currentPassword')?.invalid
               "
            >
               Vui lòng nhập mật khẩu hiện tại
            </span>
         </div>

         <div class="form-group">
            <label>Mật khẩu mới</label>
            <div class="input-eye">
               <input
                  [type]="showNew ? 'text' : 'password'"
                  formControlName="newPassword"
                  placeholder="Tối thiểu 6 ký tự"
               />
               <button type="button" class="eye-btn" (click)="showNew = !showNew">
                  <div *ngIf="!showNew">
                     <ng-icon name="lucideEye"></ng-icon>
                  </div>
                  <div *ngIf="showNew">
                     <ng-icon name="lucideEyeOff"></ng-icon>
                  </div>
               </button>
            </div>

            <!-- thanh đo password strength -->
            <div class="strength-bar" *ngIf="changeForm.get('newPassword')?.value">
               <div class="strength-track">
                  <div
                     class="strength-fill"
                     [style.width.%]="pwdStrength.percent"
                     [class]="pwdStrength.cls"
                  ></div>
               </div>
               <span class="strength-label" [class]="pwdStrength.cls">{{ pwdStrength.label }}</span>
            </div>
            <span
               class="error-text"
               *ngIf="
                  changeForm.get('newPassword')?.touched && changeForm.get('newPassword')?.invalid
               "
            >
               Mật khẩu mới phải có ít nhất 6 ký tự
            </span>
         </div>

         <div class="form-group">
            <label>Xác nhận mật khẩu mới</label>
            <div class="input-eye">
               <input
                  [type]="showConfirm ? 'text' : 'password'"
                  formControlName="confirmPassword"
                  placeholder="Nhập lại mật khẩu mới"
               />
               <button type="button" class="eye-btn" (click)="showConfirm = !showConfirm">
                  <div *ngIf="!showConfirm">
                     <ng-icon name="lucideEye"></ng-icon>
                  </div>
                  <div *ngIf="showConfirm">
                     <ng-icon name="lucideEyeOff"></ng-icon>
                  </div>
               </button>
            </div>
            <span
               class="error-text"
               *ngIf="changeForm.errors?.['mismatch'] && changeForm.get('confirmPassword')?.touched"
            >
               Mật khẩu xác nhận không khớp
            </span>
         </div>

         <div class="alert success-alert" *ngIf="successMessage">
            <ng-icon name="lucideCircleCheckBig"></ng-icon>
            {{ successMessage }}
         </div>
         <div class="error-alert" *ngIf="errorMessage">{{ errorMessage }}</div>

         <button type="submit" class="btn-primary" [disabled]="changeForm.invalid || isLoading">
            {{ isLoading ? 'Đang cập nhật...' : 'Cập nhật mật khẩu' }}
         </button>

         <div class="auth-links" (click)="goToForgotPassword()">
            <a>Quên mật khẩu hiện tại?</a>
         </div>
      </form>
   </div>
</div>
