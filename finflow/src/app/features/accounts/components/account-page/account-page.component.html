<div class="page-container">
   <!-- Header - mobile only -->
   <div class="page-top">
      <button class="back-btn" (click)="goBack()">
         <ng-icon name="lucideChevronLeft"></ng-icon>
      </button>
      <h1 class="page-title">Quản lý tài khoản</h1>
      <div style="width: 36px"></div>
   </div>

   <!-- Content -->
   <div class="page-header-actions">
      <div class="header-text">
         <h1 class="page-title">Quản lý Tài khoản</h1>
         <p class="text-muted">Tổng hợp ví tiền và thẻ ngân hàng</p>
      </div>
      <div class="action-buttons">
         <button class="btn btn-secondary" (click)="openCreate()">
            <ng-icon name="lucidePlus"></ng-icon>
            Thêm ví
         </button>
         <button class="btn btn-primary" (click)="openLinkBankModal()">
            <ng-icon name="lucideLink"></ng-icon>
            Liên kết NH
         </button>
      </div>
   </div>

   <div class="account-grid" *ngIf="!isLoading">
      <div class="account-card" *ngFor="let acc of accounts">
         <div class="card-top">
            <span class="acc-badge">{{ getAccountTypeName(acc.loaiTaiKhoanId) }}</span>
            <div class="card-actions">
               <button class="icon-btn-small text-blue" (click)="openUpdate(acc)" title="Sửa">
                  <ng-icon name="lucideSquarePen"></ng-icon>
               </button>
               <button class="icon-btn-small text-red" (click)="handleDelete(acc.id)" title="Xóa">
                  <ng-icon name="lucideTrash"></ng-icon>
               </button>
            </div>
         </div>
         <div class="card-body">
            <h3 class="acc-name">{{ acc.tenTaiKhoan }}</h3>
            <p class="acc-balance">{{ acc.soDu | number }} ₫</p>
         </div>
      </div>
   </div>

   <div class="modal-overlay" *ngIf="isLinkBankModalOpen">
      <div class="modal-content">
         <div class="modal-header">
            <h3 class="modal-title">🔗 Liên kết Ngân hàng</h3>
            <button class="close-btn" (click)="isLinkBankModalOpen = false">×</button>
         </div>
         <div class="modal-body">
            <div class="form-group">
               <label>Chọn Ngân Hàng</label>
               <select [(ngModel)]="linkBankData.tenNganHang" class="form-control">
                  <option value="Vietcombank">Vietcombank</option>
                  <option value="Techcombank">Techcombank</option>
                  <option value="MBBank">MB Bank</option>
                  <option value="Momo">Ví Momo</option>
               </select>
            </div>
            <div class="form-group mt-3">
               <label>Số tài khoản</label>
               <input
                  type="text"
                  [(ngModel)]="linkBankData.soTaiKhoan"
                  class="form-control"
                  placeholder="Nhập số tài khoản..."
               />
            </div>
            <div class="alert-info mt-3">
               <input type="checkbox" id="isDemo" [(ngModel)]="linkBankData.isDemo" />
               <label for="isDemo">
                  <strong>Bật chế độ Giả lập (Auto-Sync)</strong>
                  <p class="mb-0">Hệ thống cấp 10tr ảo & tạo giao dịch mỗi 30s.</p>
               </label>
            </div>
         </div>
         <div class="modal-actions">
            <button class="btn btn-secondary" (click)="isLinkBankModalOpen = false">Hủy</button>
            <button class="btn btn-success" (click)="submitLinkBank()" [disabled]="isLinking">
               {{ isLinking ? 'Đang kết nối...' : 'Xác nhận Liên kết' }}
            </button>
         </div>
      </div>
   </div>

   <div class="modal-overlay" *ngIf="isCreateModalOpen || isUpdateModalOpen">
      <div class="modal-content modal-sm">
         <div class="modal-header">
            <h3 class="modal-title">{{ isCreateModalOpen ? 'Thêm Ví mới' : 'Cập nhật Ví' }}</h3>
            <button
               class="close-btn"
               (click)="isCreateModalOpen = false; isUpdateModalOpen = false"
            >
               ×
            </button>
         </div>
         <div class="modal-body">
            <div class="form-group mb-3" *ngIf="isCreateModalOpen">
               <label>Loại tài khoản</label>
               <select [(ngModel)]="selectedTypeId" class="form-control">
                  <option [ngValue]="null" disabled>-- Chọn phân loại --</option>
                  <option *ngFor="let type of accountTypesList" [ngValue]="type.id">
                     {{ type.ten }}
                  </option>
               </select>
            </div>
            <div class="form-group">
               <label>Tên ví / Tài khoản</label>
               <input
                  type="text"
                  [(ngModel)]="newTypeName"
                  class="form-control"
                  placeholder="Ví dụ: Tiền mặt, Heo đất..."
               />
            </div>
         </div>
         <div class="modal-actions">
            <button
               class="btn btn-secondary"
               (click)="isCreateModalOpen = false; isUpdateModalOpen = false"
            >
               Hủy
            </button>
            <button
               class="btn btn-primary"
               (click)="isCreateModalOpen ? submitCreate() : submitUpdate()"
            >
               Lưu Tài Khoản
            </button>
         </div>
      </div>
   </div>

   <app-pagination
      [page]="page"
      [pageSize]="pageSize"
      [totalCount]="totalCount"
      (pageChange)="changePage($event)"
      (pageSizeChange)="changePageSize($event)"
   >
   </app-pagination>
</div>
