<div class="modal-overlay" *ngIf="modalService.isOpen$ | async">
   <div class="modal-content">
      <div class="modal-header">
         <h3 class="modal-title">{{ isEditMode ? 'Cập nhật' : 'Thêm' }} Giao Dịch</h3>
         <button type="button" class="close-btn" (click)="modalService.close()">×</button>
      </div>

      <form [formGroup]="txForm" (ngSubmit)="submitForm()" class="modal-form">
         <div class="modal-body">
            <div class="form-grid">
               <div class="form-group col-span-2">
                  <div class="radio-tabs">
                     <label class="radio-tab">
                        <input type="radio" formControlName="loaiGiaoDich" value="Thu" />
                        <span class="tab-btn">Thu nhập</span>
                     </label>
                     <label class="radio-tab">
                        <input type="radio" formControlName="loaiGiaoDich" value="Chi" />
                        <span class="tab-btn">Chi tiêu</span>
                     </label>
                  </div>
               </div>

               <div class="form-group">
                  <label>Ngày GD <span class="required">*</span></label>
                  <input type="date" formControlName="ngayGiaoDich" class="form-control" />
               </div>

               <div class="form-group">
                  <label>Số tiền (VND) <span class="required">*</span></label>
                  <input
                     type="text"
                     [ngModel]="displayAmount"
                     (ngModelChange)="onAmountInput($event)"
                     [ngModelOptions]="{ standalone: true }"
                     class="form-control amount-input"
                     [ngClass]="{
                        'text-success': txForm.get('loaiGiaoDich')?.value === 'Thu',
                        'text-error': txForm.get('loaiGiaoDich')?.value === 'Chi',
                     }"
                     placeholder="0"
                  />
               </div>

               <div class="form-group col-span-2">
                  <label>Tên giao dịch <span class="required">*</span></label>
                  <input
                     type="text"
                     formControlName="tenGiaoDich"
                     class="form-control"
                     placeholder="Ví dụ: Mua sắm siêu thị..."
                  />
               </div>

               <div class="form-group">
                  <label>Danh mục <span class="required">*</span></label>
                  <select formControlName="theLoaiId" class="form-control">
                     <option [ngValue]="null" disabled>-- Chọn --</option>
                     <option *ngFor="let cat of filteredCategories" [value]="cat.id">
                        {{ cat.tenTheLoai }}
                     </option>
                  </select>
               </div>

               <div class="form-group">
                  <label>Tài khoản <span class="required">*</span></label>
                  <select formControlName="taiKhoanGocId" class="form-control">
                     <option [ngValue]="null" disabled>-- Chọn --</option>
                     <option *ngFor="let acc of accounts" [value]="acc.id">
                        {{ acc.tenTaiKhoan }} ({{ acc.soDu | number }} ₫)
                     </option>
                  </select>
               </div>

               <div class="form-group col-span-2 transfer-box" *ngIf="isTransferMode">
                  <label>Chuyển đến (Tài khoản nhận) <span class="required">*</span></label>
                  <select formControlName="taiKhoanPhuId" class="form-control">
                     <option [ngValue]="null" disabled>-- Chọn tài khoản nhận --</option>
                     <ng-container *ngFor="let acc of accounts">
                        <option
                           *ngIf="acc.id != txForm.get('taiKhoanGocId')?.value"
                           [ngValue]="acc.id"
                        >
                           {{ acc.tenTaiKhoan }} ({{ acc.soDu | number }} ₫)
                        </option>
                     </ng-container>
                  </select>
               </div>

               <div class="form-group col-span-2">
                  <label>Ghi chú</label>
                  <textarea
                     formControlName="ghiChu"
                     class="form-control"
                     rows="2"
                     placeholder="Nhập ghi chú..."
                  ></textarea>
               </div>
            </div>
         </div>

         <div class="modal-actions">
            <button type="button" class="btn btn-secondary" (click)="modalService.close()">
               Hủy
            </button>
            <button type="submit" class="btn btn-primary" [disabled]="txForm.invalid">Lưu</button>
         </div>
      </form>
   </div>
</div>
